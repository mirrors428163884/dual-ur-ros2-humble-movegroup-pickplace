/**:
  controller_manager:
    ros__parameters:
      update_rate: 100  # Hz

      left_controller:
        type: joint_trajectory_controller/JointTrajectoryController


      right_controller:
        type: joint_trajectory_controller/JointTrajectoryController


      left_gripper_controller:
        type: position_controllers/GripperActionController


      right_gripper_controller:
        type: position_controllers/GripperActionController


      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster

  left_controller:
    ros__parameters:
      joints:
        - left_shoulder_pan_joint
        - left_shoulder_lift_joint
        - left_elbow_joint
        - left_wrist_1_joint
        - left_wrist_2_joint
        - left_wrist_3_joint
      command_interfaces:
        - position
      state_interfaces:
        - position
        - velocity
  right_controller:
    ros__parameters:
      joints:
        - right_shoulder_pan_joint
        - right_shoulder_lift_joint
        - right_elbow_joint
        - right_wrist_1_joint
        - right_wrist_2_joint
        - right_wrist_3_joint
      command_interfaces:
        - position
      state_interfaces:
        - position
        - velocity
  left_gripper_controller:
    ros__parameters:
      joint: left_robotiq_85_left_knuckle_joint  # <--- 改正：使用单数 joint，且直接写名字
      command_interfaces:
        - position
      state_interfaces:
        - position
        - velocity
      # 可选：设置动作服务器名称，默认为 gripper_cmd
      action_name: gripper_cmd 

  right_gripper_controller:
    ros__parameters:
      joint: right_robotiq_85_left_knuckle_joint # <--- 改正：使用单数 joint
      command_interfaces:
        - position
      state_interfaces:
        - position
        - velocity
      action_name: gripper_cmd